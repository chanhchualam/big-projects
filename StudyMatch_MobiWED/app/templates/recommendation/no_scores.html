{% extends "base.html" %}

{% block title %}Gợi Ý Ngành - StudyMatch{% endblock %}

{% block content %}
<div class="no-scores-container">
    <div class="empty-state">
        <h1>Chưa Có Điểm Số</h1>
        <p>Để nhận gợi ý ngành học, bạn cần phải nhập điểm thi THPT của mình trước.</p>
        
        <div class="empty-actions">
            <a href="{{ url_for('student.enter_scores') }}" class="btn btn-primary btn-large">
                Nhập Điểm Ngay
            </a>
            <a href="{{ url_for('major.list_majors') }}" class="btn btn-secondary btn-large">
                Khám Phá Các Ngành Học
            </a>
        </div>
    </div>
</div>

<style>
.no-scores-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 500px;
}

.empty-state {
    background: white;
    padding: 3rem;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 500px;
}

.empty-state h1 {
    color: #0066cc;
    margin-bottom: 1rem;
}

.empty-state p {
    color: #666;
    font-size: 1.1rem;
    margin-bottom: 2rem;
    line-height: 1.6;
}

.empty-actions {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.btn-large {
    padding: 1rem 2rem;
    font-size: 1.1rem;
}
</style>
{% endblock %}
