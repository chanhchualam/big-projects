name: smartbudget
description: Ứng dụng quản lý chi tiêu cá nhân thông minh
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  
  # State Management
  provider: ^6.1.1
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Charts
  fl_chart: ^0.66.0
  
  # Image & Camera
  image_picker: ^1.0.7
  camera: ^0.10.5+5
  
  # OCR
  google_mlkit_text_recognition: ^0.11.0
  
  # Date & Time
  intl: ^0.19.0
  
  # Permissions
  permission_handler: ^11.1.0
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  
  # File & Cloud Sync
  path_provider: ^2.1.1
  http: ^1.1.2
  
  # Crypto (for password hashing)
  crypto: ^3.0.3
  
  # SMS Reading (Android) - Commented out until needed
  # sms_advanced: ^1.1.0
  
  # QR Code
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

